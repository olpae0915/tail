name: Build TailGame

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean package
      - name: Upload jar
        uses: actions/upload-artifact@v3
        with:
          name: TailGame
          path: target/TailGame-1.0.0.jar
